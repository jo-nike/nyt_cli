name: ci

# Vet + test on every push to main and on pull requests, so the release tag is
# never the first time the code is exercised in CI.
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  vet-and-test:
    name: vet & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
