name: release

# Fires on every vX.Y.Z tag: GoReleaser cross-compiles, archives, checksums, and
# publishes a GitHub release with the platform binaries plus the skill bundle.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required for GoReleaser to create the release

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog can be built

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
